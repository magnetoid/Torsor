upstream torsor_api {
    # The Go control plane is the backend (api→control-plane cutover, ADR 0009).
    server control-plane:3001;
    keepalive 32;
}

# Host-mode live previews: requests for <projectID>.preview.<domain> are forwarded
# whole (path untouched, Host preserved) to the control plane, whose host-router serves
# the workspace app at "/" on its own origin (see TORSOR_PREVIEW_DOMAIN). The front
# proxy (host nginx) terminates TLS for *.preview.<domain> and passes Host through.
# No SPA fallback, no platform security headers — the previewed app owns its origin.
server {
    listen 80;
    server_name ~^.+\.preview\..+$;

    client_max_body_size 5m;

    location / {
        proxy_pass http://torsor_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        # WebSocket pass-through (Vite HMR, app websockets).
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $sent_http_content_type $cache_control_static {
    default                            "public, max-age=31536000, immutable";
    "text/html"                        "no-cache";
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;
    client_max_body_size 5m;

    add_header X-Frame-Options              "SAMEORIGIN" always;
    add_header X-Content-Type-Options       "nosniff"    always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy           "camera=(), microphone=(), geolocation=()" always;
    # Pragmatic CSP: tight enough to block object/base-tag injection and foreign framing,
    # loose enough for the SPA's needs — Monaco needs 'unsafe-eval' (new Function) and
    # blob: workers; runtime style injection needs 'unsafe-inline'; the live-preview iframe
    # and cross-origin API (when VITE_API_URL is set) need https:/wss: in connect/frame-src.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; worker-src 'self' blob:; connect-src 'self' https: wss:; frame-src 'self' https:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/wasm
        image/svg+xml
        font/ttf
        font/woff
        font/woff2;

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;

        proxy_pass http://torsor_api/api/;
    }

    location /ready {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_pass http://torsor_api/ready;
    }

    # Public deployment proxy: /d/{projectId}/... -> the control plane, which serves the
    # deployed project's running app (gated on an active deployment row, no token). Front a
    # subdomain here (e.g. *.apps.torsor.dev) via reverse proxy for per-app production URLs.
    location /d/ {
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $http_upgrade;
        proxy_buffering off;
        proxy_read_timeout  300s;
        proxy_pass http://torsor_api;
    }

    location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|webp|avif|ico|wasm)$ {
        expires 1y;
        add_header Cache-Control $cache_control_static always;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}
