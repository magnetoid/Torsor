name: torsor

# Production-leaning defaults for Coolify (and any Compose host).
# - Internal services use `expose`, not host `ports`
# - No fixed `container_name` values, so deploys stay namespace-safe
# - The Go control-plane is now the backend (the api→control-plane cutover, ADR 0009).
#   It applies migrations on startup and hosts the AI agent, workspace runtime, live
#   preview, terminal exec, and model providers — the features the frontend calls.
# - For local dev, `docker-compose.override.yml` flips to dev mode (NODE_ENV=development,
#   frontend hot-reload).

x-postgres-env: &postgres-env
  POSTGRES_DB: ${POSTGRES_DB:-torsor_dev}
  POSTGRES_USER: ${POSTGRES_USER:-postgres}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}

x-restart-policy: &restart-policy
  restart: unless-stopped

x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

services:
  postgres:
    image: postgres:16-alpine
    <<: [*restart-policy, *default-logging]
    environment:
      <<: *postgres-env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - torsor_network
    mem_limit: 1g
    cpus: 1.0

  redis:
    image: redis:7-alpine
    <<: [*restart-policy, *default-logging]
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s
    networks:
      - torsor_network
    mem_limit: 384m
    cpus: 0.5

  # The Go control plane — the backend. Bundles the ollama-model provider + the
  # mock/docker workspace runtimes (see apps/control-plane/Dockerfile).
  control-plane:
    build:
      context: ./apps/control-plane
      dockerfile: Dockerfile
    <<: [*restart-policy, *default-logging]
    environment:
      # NODE_ENV=production makes the control plane FAIL CLOSED: it refuses to boot
      # without a strong JWT_SECRET and never seeds a demo user. Provide JWT_SECRET.
      NODE_ENV: ${NODE_ENV:-production}
      PORT: "3001"
      APP_URL: ${APP_URL:-http://localhost:3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-torsor_dev}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SUPER_ADMIN_EMAILS: ${SUPER_ADMIN_EMAILS:-}
      # AES-256 key (32 bytes) for encrypting BYO API keys at rest. Set in production.
      TORSOR_SECRET_KEY: ${TORSOR_SECRET_KEY:-}
      # Model providers: the free local default via Ollama. Point OLLAMA_HOST at your
      # Ollama server (the optional `ollama` service below, or one on the host), and pull
      # the matching model (`ollama pull qwen2.5-coder:3b`). qwen2.5-coder:3b (~2GB) runs
      # on CPU-only hosts; on a bigger box use :7b or qwen3-coder and set OLLAMA_MODEL.
      # Hosted providers are BYO-key: they load without any host key and unlock per user
      # once a key is saved in Settings → API Keys (encrypted secrets: ANTHROPIC_API_KEY,
      # OPENAI_API_KEY, GOOGLE_API_KEY, DEEPSEEK_API_KEY, OPENROUTER_API_KEY).
      TORSOR_MODEL_PLUGINS: /app/ollama-model,/app/anthropic-model,/app/openai-model,/app/gemini-model,/app/deepseek-model,/app/openrouter-model
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5-coder:3b}
      # Default provider for agent runs when the caller names none — background/delegated
      # runs always take this path. "ollama" keeps the free-local promise (no key required).
      TORSOR_DEFAULT_MODEL: ${TORSOR_DEFAULT_MODEL:-ollama}
      # Per-role model routing (dual-model pattern): send planning/reflection to one
      # provider and the tool loop to another, e.g. "plan=anthropic,step=ollama,reflect=ollama".
      # Explicit user picks always win; unrouted roles use TORSOR_DEFAULT_MODEL.
      TORSOR_MODEL_ROUTING: ${TORSOR_MODEL_ROUTING:-}
      # Workspace runtimes: mock (in-memory, safe anywhere) + docker (real containers).
      # Default to docker so terminals/preview/agent-exec are REAL. This requires the
      # Docker socket mounted below. SECURITY: mounting the socket gives this container
      # root-equivalent host access — only do this on a SINGLE-TENANT self-host. For
      # multi-tenant, run docker-runtime on a dedicated worker host (or the future
      # firecracker-runtime) and set TORSOR_DEFAULT_RUNTIME=mock here.
      TORSOR_WORKSPACE_RUNTIME_PLUGINS: /app/mock-runtime,/app/docker-runtime
      TORSOR_DEFAULT_RUNTIME: ${TORSOR_DEFAULT_RUNTIME:-docker}
      TORSOR_WS_IMAGE_ALLOWLIST: ${TORSOR_WS_IMAGE_ALLOWLIST:-}
      # Live preview / deploy: a fresh workspace runs this image (node so a JS/TS dev
      # server works out of the box) and publishes this port to a random loopback host
      # port that the preview + deploy proxies target. Without APP_PORT nothing is
      # published and the preview can never reach the app. The agent is told to bind its
      # server to 0.0.0.0 on this port.
      TORSOR_WS_DEFAULT_IMAGE: ${TORSOR_WS_DEFAULT_IMAGE:-node:20-alpine}
      TORSOR_WS_APP_PORT: ${TORSOR_WS_APP_PORT:-3000}
      TORSOR_WS_MEMORY: ${TORSOR_WS_MEMORY:-1g}
      # Dedicated bridge network for workspace containers (auto-created by the
      # docker-runtime plugin). Gives workspaces their own subnet so the host firewall
      # can block metadata/RFC1918 egress for exactly that subnet — apply
      # scripts/harden-workspace-egress.sh on the host after first boot
      # (see docs/PRODUCTION-HARDENING.md §4).
      TORSOR_WS_NETWORK: ${TORSOR_WS_NETWORK:-torsor-ws}
      # OCI runtime for workspaces; set to "runsc" after installing gVisor on the host
      # for userspace-kernel isolation of agent-generated code.
      TORSOR_WS_DOCKER_RUNTIME: ${TORSOR_WS_DOCKER_RUNTIME:-}
      # Host-mode previews: set to a wildcard-routed domain (e.g. preview.torsor.dev with
      # *.preview.torsor.dev DNS + TLS pointing at this stack) and each project's live
      # preview is served at <projectID>.<domain> on its own origin — required for apps
      # with root-absolute asset URLs (Vite dev) and for working HMR. Empty = path-mode
      # preview only (single-file/relative-URL apps).
      TORSOR_PREVIEW_DOMAIN: ${TORSOR_PREVIEW_DOMAIN:-}
      # The host interface the workspace port is published on. This container proxies the
      # preview/deploy to it, so it must be reachable FROM this container. Default EMPTY on
      # purpose: the runtime then auto-resolves host.docker.internal (the docker gateway —
      # exactly the address a containerized control-plane reaches the host at) and falls
      # back to 127.0.0.1 only when that doesn't resolve (control plane directly on the
      # host). A hardcoded 127.0.0.1 default here previously forced loopback bindings the
      # containerized control-plane could not reach — breaking previews silently. Override
      # only to pin a specific interface; never expose to the public internet.
      TORSOR_WS_PUBLISH_HOST: ${TORSOR_WS_PUBLISH_HOST:-}
    expose:
      - "3001"
    volumes:
      # Real container workspaces need the Docker engine. Remove this (and set
      # TORSOR_DEFAULT_RUNTIME=mock) on shared/multi-tenant hosts.
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      # Lets OLLAMA_HOST=host.docker.internal reach an Ollama running on the host (Linux).
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - torsor_network
    # NOTE: the control-plane is ALSO attached to the dedicated workspace network
    # (torsor-ws) so previews reach workspace containers directly by IP — but the
    # attachment is done by the docker-runtime plugin at boot (self-connect), NOT here:
    # a fixed-name network declared in compose collides with the runtime-created
    # (label-less) one and fails the whole deploy ("found but has incorrect labels").
    healthcheck:
      test: ["CMD", "/app/control-plane", "-health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    mem_limit: 512m
    cpus: 1.0
    stop_grace_period: 30s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    <<: [*restart-policy, *default-logging]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      VITE_API_URL: ${VITE_API_URL:-}
    expose:
      - "80"
    # Loopback host bind for Plesk/external reverse proxies. Coolify users with
    # native Traefik ingress can omit FRONTEND_HOST_PORT (or set it empty) and
    # delete the `ports` block.
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT:-18080}:80"
    depends_on:
      control-plane:
        condition: service_healthy
    networks:
      - torsor_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health | grep -q ok"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 128m
    cpus: 0.5

  # Optional local model server (free AI). Enable with `--profile ai`. Pull a coding
  # model into it once, e.g. `docker compose exec ollama ollama pull qwen3-coder`.
  ollama:
    image: ollama/ollama:latest
    <<: [*restart-policy, *default-logging]
    profiles:
      - ai
    volumes:
      - ollama_data:/root/.ollama
    expose:
      - "11434"
    networks:
      - torsor_network
    mem_limit: 8g

  adminer:
    image: adminer:4-standalone
    <<: [*restart-policy, *default-logging]
    profiles:
      - tools
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - torsor_network
    mem_limit: 128m

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  frontend_node_modules:

networks:
  torsor_network:
    driver: bridge
