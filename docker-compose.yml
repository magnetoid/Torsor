name: torsor

# Production-leaning defaults for Coolify (and any Compose host).
# - Internal services use `expose`, not host `ports`
# - No fixed `container_name` values, so deploys stay namespace-safe
# - Migrations are applied by the API on startup (apps/api/migrations)
# - For local dev, `docker-compose.override.yml` flips images to dev mode

x-postgres-env: &postgres-env
  POSTGRES_DB: ${POSTGRES_DB:-torsor_dev}
  POSTGRES_USER: ${POSTGRES_USER:-postgres}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}

x-app-env: &app-env
  NODE_ENV: ${NODE_ENV:-production}
  APP_ENV: ${APP_ENV:-production}
  API_PORT: ${API_PORT:-3001}
  FRONTEND_PORT: ${FRONTEND_PORT:-3000}
  APP_URL: ${APP_URL:-http://localhost:3000}
  DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-torsor_dev}
  REDIS_URL: redis://redis:6379
  JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
  JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  SUPER_ADMIN_EMAILS: ${SUPER_ADMIN_EMAILS:-}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  SUPABASE_URL: ${SUPABASE_URL:-}
  SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
  SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}

x-restart-policy: &restart-policy
  restart: unless-stopped

x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

services:
  postgres:
    image: postgres:16-alpine
    <<: [*restart-policy, *default-logging]
    environment:
      <<: *postgres-env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - torsor_network
    mem_limit: 1g
    cpus: 1.0

  redis:
    image: redis:7-alpine
    <<: [*restart-policy, *default-logging]
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s
    networks:
      - torsor_network
    mem_limit: 384m
    cpus: 0.5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: production
    <<: [*restart-policy, *default-logging]
    environment:
      <<: *app-env
      PORT: ${API_PORT:-3001}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    expose:
      - "${API_PORT:-3001}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - torsor_network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 3001) + '/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    mem_limit: 512m
    cpus: 1.0
    stop_grace_period: 30s

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
      target: production
    <<: [*restart-policy, *default-logging]
    environment:
      <<: *app-env
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      WORKER_POLL_INTERVAL_MS: ${WORKER_POLL_INTERVAL_MS:-5000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - torsor_network
    mem_limit: 512m
    cpus: 1.0
    stop_grace_period: 30s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    <<: [*restart-policy, *default-logging]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      APP_ENV: ${APP_ENV:-production}
      VITE_API_URL: ${VITE_API_URL:-}
    expose:
      - "80"
    # Loopback host bind for Plesk/external reverse proxies. Coolify users with
    # native Traefik ingress can omit FRONTEND_HOST_PORT (or set it empty) and
    # delete the `ports` block.
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT:-18080}:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - torsor_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health | grep -q ok"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 128m
    cpus: 0.5

  adminer:
    image: adminer:4-standalone
    <<: [*restart-policy, *default-logging]
    profiles:
      - tools
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - torsor_network
    mem_limit: 128m

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
  api_node_modules:
  worker_node_modules:

networks:
  torsor_network:
    driver: bridge
