name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Frontend + Node services (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      # lint = tsc --noEmit for frontend, apps/api and apps/worker
      - run: npm run lint
      - run: npm run build

  control-plane:
    name: Go control plane (build + vet + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/control-plane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/control-plane/go.mod
          cache-dependency-path: apps/control-plane/go.sum
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
