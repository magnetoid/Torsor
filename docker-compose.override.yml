# Local Development Overrides — auto-merged by `docker compose up`.
# Flips the stack to a friendly local mode: the control plane runs in development
# (NODE_ENV=development → seeds demo@torsor.local / demo12345, allows the throwaway JWT
# secret) and the frontend hot-reloads. Coolify/production ignore this file.

services:
  control-plane:
    environment:
      NODE_ENV: development
      # No JWT_SECRET needed in dev (the well-known throwaway secret is allowed).
      CORS_ORIGIN: http://localhost:3000
      # Use the in-memory runtime by default locally so `docker compose up` needs no
      # Docker socket; flip to docker once you've confirmed the daemon is reachable.
      TORSOR_DEFAULT_RUNTIME: ${TORSOR_DEFAULT_RUNTIME:-mock}

  frontend:
    build:
      target: development
    command: npm run dev -- --host 0.0.0.0 --port ${FRONTEND_PORT:-3000}
    environment:
      NODE_ENV: development
      # Same-origin in prod (nginx proxies /api); in dev the vite server proxies via
      # VITE_API_URL, so point it at the control plane.
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"

  # Expose infra locally for host tooling / running the control plane via `go run`.
  postgres:
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
  redis:
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
